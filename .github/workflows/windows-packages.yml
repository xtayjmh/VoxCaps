name: Windows dual packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build full and client-only packages
        shell: powershell
        run: ./scripts/build-windows-packages.ps1

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: CapsWriter-Offline-Windows
          path: release/*.zip
          if-no-files-found: error
